<!doctype html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>幸運轉盤小遊戲</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #f8fafc, #dbeafe);
            color: #172033;
        }

        .game {
            width: min(92vw, 460px);
            text-align: center;
        }

        h1 {
            margin: 0 0 22px;
            font-size: 32px;
            letter-spacing: 0;
        }

        .wheel-wrap {
            position: relative;
            width: min(88vw, 380px);
            aspect-ratio: 1;
            margin: 0 auto 24px;
        }

        .pointer {
            position: absolute;
            top: -8px;
            left: 50%;
            z-index: 5;
            width: 0;
            height: 0;
            transform: translateX(-50%);
            border-left: 18px solid transparent;
            border-right: 18px solid transparent;
            border-top: 34px solid #111827;
            filter: drop-shadow(0 4px 5px rgba(0, 0, 0, .25));
        }

        .wheel {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 10px solid #ffffff;
            background: conic-gradient(from -90deg,
                    #ef4444 0deg 45deg,
                    #f59e0b 45deg 90deg,
                    #10b981 90deg 135deg,
                    #3b82f6 135deg 180deg,
                    #8b5cf6 180deg 225deg,
                    #ec4899 225deg 270deg,
                    #14b8a6 270deg 315deg,
                    #f97316 315deg 360deg);
            box-shadow:
                0 24px 50px rgba(15, 23, 42, .22),
                inset 0 0 0 2px rgba(255, 255, 255, .45);
            transition: transform 4s cubic-bezier(.12, .82, .18, 1);
            overflow: hidden;
        }

        .wheel::after {
            content: "";
            position: absolute;
            inset: 50%;
            width: 68px;
            height: 68px;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background: #ffffff;
            box-shadow: 0 4px 16px rgba(15, 23, 42, .22);
        }

        .label {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 50%;
            height: 28px;
            transform-origin: 0 50%;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 18px;
            font-size: 15px;
            font-weight: 800;
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0, 0, 0, .28);
            pointer-events: none;
        }

        button {
            width: 180px;
            height: 48px;
            border: 0;
            border-radius: 999px;
            background: #111827;
            color: #ffffff;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 12px 24px rgba(17, 24, 39, .28);
        }

        button:disabled {
            cursor: not-allowed;
            opacity: .55;
        }

        .result {
            min-height: 32px;
            margin-top: 18px;
            font-size: 22px;
            font-weight: 800;
        }
    </style>

</head>

<body>
    <main class="game">
        <h1>幸運轉盤</h1>
        <section class="wheel-wrap">
            <div class="pointer"></div>
            <div class="wheel" id="wheel"></div>
        </section>

        <button id="spinBtn">開始轉動</button>
        <div class="result" id="result">按下按鈕試試手氣</div>
    </main>
    <script> const prizes = ["100 分", "再一次", "50 分", "謝謝參與", "200 分", "小獎品", "80 分", "大獎"]; const wheel = document.getElementById("wheel"); const spinBtn = document.getElementById("spinBtn"); const result = document.getElementById("result"); let currentRotation = 0; let spinning = false; prizes.forEach((prize, index) => { const label = document.createElement("div"); label.className = "label"; label.textContent = prize; label.style.transform = `rotate(${index * 45 + 22.5}deg) translateY(-50%)`; wheel.appendChild(label); }); spinBtn.addEventListener("click", () => { if (spinning) return; spinning = true; spinBtn.disabled = true; result.textContent = "轉動中..."; const prizeIndex = Math.floor(Math.random() * prizes.length); const segmentAngle = 360 / prizes.length; const targetAngle = prizeIndex * segmentAngle + segmentAngle / 2; const extraTurns = 6 + Math.floor(Math.random() * 3); currentRotation += extraTurns * 360 + (360 - targetAngle); wheel.style.transform = `rotate(${currentRotation}deg)`; setTimeout(() => { result.textContent = `恭喜獲得：${prizes[prizeIndex]}`; spinning = false; spinBtn.disabled = false; }, 4200); }); </script>
</body>

</html>
