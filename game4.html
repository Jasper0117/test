<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>拼圖小遊戲</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, "Microsoft JhengHei", sans-serif;
      background: #f3f4f6;
      color: #1f2937;
    }

    .game {
      width: min(94vw, 520px);
      text-align: center;
      padding: 18px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: 30px;
    }

    .hud {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }

    .hud div {
      padding: 10px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      background: #ffffff;
      font-weight: 800;
    }

    .board {
      width: min(92vw, 460px);
      aspect-ratio: 1;
      margin: 0 auto;
      display: grid;
      gap: 6px;
      padding: 6px;
      border-radius: 10px;
      background: #111827;
      box-shadow: 0 20px 50px rgba(17, 24, 39, .22);
    }

    .tile {
      position: relative;
      border: 0;
      border-radius: 8px;
      cursor: pointer;
      color: #ffffff;
      font-size: clamp(20px, 7vw, 42px);
      font-weight: 900;
      text-shadow: 0 2px 8px rgba(0, 0, 0, .45);
      background-image:
        radial-gradient(circle at 25% 20%, rgba(255,255,255,.65), transparent 16%),
        radial-gradient(circle at 72% 72%, rgba(255,255,255,.45), transparent 15%),
        linear-gradient(135deg, #ef4444, #f59e0b 28%, #10b981 55%, #3b82f6 78%, #7c3aed);
      background-size: var(--bg-size) var(--bg-size);
      transition: transform .15s ease, filter .15s ease;
    }

    .tile:hover {
      transform: scale(.96);
      filter: brightness(1.08);
    }

    .tile.empty {
      cursor: default;
      background: #1f2937;
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, .08);
    }

    .tile.empty:hover {
      transform: none;
      filter: none;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }

    button.action,
    select {
      flex: 1;
      height: 44px;
      border: 0;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 800;
    }

    button.action {
      background: #111827;
      color: #ffffff;
      cursor: pointer;
    }

    select {
      padding: 0 12px;
      background: #ffffff;
      color: #111827;
      border: 1px solid #d1d5db;
    }

    .message {
      min-height: 28px;
      margin-top: 14px;
      font-size: 20px;
      font-weight: 900;
      color: #047857;
    }

    .tip {
      margin-top: 8px;
      color: #6b7280;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main class="game">
    <h1>滑塊拼圖</h1>

    <section class="hud">
      <div>步數：<span id="moves">0</span></div>
      <div>時間：<span id="time">0</span>s</div>
      <div>尺寸：<span id="sizeText">3×3</span></div>
    </section>

    <section class="board" id="board"></section>

    <section class="controls">
      <button class="action" id="shuffleBtn">重新洗牌</button>
      <select id="sizeSelect">
        <option value="3">3×3</option>
        <option value="4">4×4</option>
        <option value="5">5×5</option>
      </select>
    </section>

    <div class="message" id="message"></div>
    <div class="tip">點擊空格旁邊的拼圖，把圖片排回正確順序。</div>
  </main>

  <script>
    const boardEl = document.getElementById("board");
    const movesEl = document.getElementById("moves");
    const timeEl = document.getElementById("time");
    const sizeTextEl = document.getElementById("sizeText");
    const messageEl = document.getElementById("message");
    const shuffleBtn = document.getElementById("shuffleBtn");
    const sizeSelect = document.getElementById("sizeSelect");

    let size = 3;
    let tiles = [];
    let emptyIndex = 0;
    let moves = 0;
    let seconds = 0;
    let timer = null;
    let playing = false;

    function startGame() {
      clearInterval(timer);

      size = Number(sizeSelect.value);
      const total = size * size;

      tiles = Array.from({ length: total - 1 }, (_, i) => i + 1);
      tiles.push(0);
      emptyIndex = total - 1;
      moves = 0;
      seconds = 0;
      playing = false;

      sizeTextEl.textContent = `${size}×${size}`;
      messageEl.textContent = "";
      updateHud();
      shuffleTiles();
      drawBoard();
    }

    function updateHud() {
      movesEl.textContent = moves;
      timeEl.textContent = seconds;
    }

    function startTimer() {
      if (playing) return;

      playing = true;
      timer = setInterval(() => {
        seconds++;
        updateHud();
      }, 1000);
    }

    function drawBoard() {
      boardEl.innerHTML = "";
      boardEl.style.gridTemplateColumns = `repeat(${size}, 1fr)`;

      const boardWidth = boardEl.clientWidth;
      boardEl.style.setProperty("--bg-size", `${boardWidth - 12}px`);

      tiles.forEach((value, index) => {
        const tile = document.createElement("button");
        tile.className = value === 0 ? "tile empty" : "tile";
        tile.type = "button";

        if (value !== 0) {
          const correctIndex = value - 1;
          const row = Math.floor(correctIndex / size);
          const col = correctIndex % size;
          const step = 100 / (size - 1);

          tile.textContent = value;
          tile.style.backgroundPosition = `${col * step}% ${row * step}%`;
          tile.addEventListener("click", () => moveTile(index));
        }

        boardEl.appendChild(tile);
      });
    }

    function getMovableIndexes() {
      const indexes = [];
      const row = Math.floor(emptyIndex / size);
      const col = emptyIndex % size;

      if (row > 0) indexes.push(emptyIndex - size);
      if (row < size - 1) indexes.push(emptyIndex + size);
      if (col > 0) indexes.push(emptyIndex - 1);
      if (col < size - 1) indexes.push(emptyIndex + 1);

      return indexes;
    }

    function shuffleTiles() {
      let lastEmpty = -1;
      const steps = size * size * 60;

      for (let i = 0; i < steps; i++) {
        let options = getMovableIndexes().filter(index => index !== lastEmpty);

        if (options.length === 0) {
          options = getMovableIndexes();
        }

        const picked = options[Math.floor(Math.random() * options.length)];

        lastEmpty = emptyIndex;
        [tiles[emptyIndex], tiles[picked]] = [tiles[picked], tiles[emptyIndex]];
        emptyIndex = picked;
      }
    }

    function moveTile(index) {
      if (!getMovableIndexes().includes(index)) return;

      startTimer();

      [tiles[emptyIndex], tiles[index]] = [tiles[index], tiles[emptyIndex]];
      emptyIndex = index;
      moves++;

      updateHud();
      drawBoard();

      if (isSolved()) {
        clearInterval(timer);
        playing = false;
        messageEl.textContent = `完成！你用了 ${moves} 步、${seconds} 秒。`;
      }
    }

    function isSolved() {
      for (let i = 0; i < tiles.length - 1; i++) {
        if (tiles[i] !== i + 1) return false;
      }

      return tiles[tiles.length - 1] === 0;
    }

    shuffleBtn.addEventListener("click", startGame);
    sizeSelect.addEventListener("change", startGame);
    window.addEventListener("resize", drawBoard);

    startGame();
  </script>
</body>
</html>
